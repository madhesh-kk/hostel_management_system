spring.application.name=hostel-management

# ── MySQL DataSource ─────────────────────────────────────────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/hostel_management?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:madhesh@24680}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ──────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── Server ───────────────────────────────────────────────────────────────────
server.port=8081

# ── JWT ──────────────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:hostelManagement2024SecretKeyForJWTSigningMustBe256BitsLong!}
jwt.expiration=86400000
